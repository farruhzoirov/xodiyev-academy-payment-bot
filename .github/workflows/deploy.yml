name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          envs: BOT_TOKEN,MONGO_URI,API_PORT,PM2_INSTANCES
          script: |
            set -e

            # Load Node.js — try nvm first, then system path
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # Install Node.js 20 via NodeSource if still not found
            if ! command -v npm &>/dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y nodejs
            fi

            APP_DIR=/var/www/xodiyev-academy-payment-bot

            if [ ! -d "$APP_DIR" ]; then
              echo "Cloning repository..."
              mkdir -p /var/www
              git clone https://github.com/farruhzoirov/xodiyev-academy-payment-bot.git "$APP_DIR"
            fi

            cd "$APP_DIR"

            echo "Writing .env..."
            cat > .env <<ENV
            BOT_TOKEN=${BOT_TOKEN}
            MONGO_URI=${MONGO_URI}
            API_PORT=${API_PORT}
            PM2_INSTANCES=${PM2_INSTANCES}
            ENV

            echo "Pulling latest changes..."
            git pull origin main

            echo "Installing dependencies..."
            npm ci

            echo "Building..."
            npm run build

            echo "Restarting PM2..."
            pm2 restart ecosystem.config.js --update-env \
              || pm2 start ecosystem.config.js --env production

            pm2 save

            echo "Deploy complete."
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
          API_PORT: ${{ secrets.API_PORT }}
          PM2_INSTANCES: ${{ vars.PM2_INSTANCES }}
